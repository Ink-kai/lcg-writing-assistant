name: Obsidian plugin validation

on:
  push:
    branches: ["**"]
    paths:
      - ".github/workflows/lint.yml"
      - ".github/scripts/validate-obsidian-plugin.mjs"
      - "eslint.config.mts"
      - "manifest.json"
      - "package-lock.json"
      - "package.json"
      - "src/**"
      - "styles.css"
      - "tsconfig.json"
      - "versions.json"
  pull_request:
    branches: ["**"]
    paths:
      - ".github/workflows/lint.yml"
      - ".github/scripts/validate-obsidian-plugin.mjs"
      - "eslint.config.mts"
      - "manifest.json"
      - "package-lock.json"
      - "package.json"
      - "src/**"
      - "styles.css"
      - "tsconfig.json"
      - "versions.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: obsidian-plugin-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate plugin
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Obsidian ESLint rules
        env:
          OBSIDIANMD_DEBUG_SENTENCE_CASE: "1"
        run: npm run lint -- --format stylish

      - name: Build release artifacts
        run: npm run build

      - name: Validate Obsidian metadata and artifacts
        run: node .github/scripts/validate-obsidian-plugin.mjs
